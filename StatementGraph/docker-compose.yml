services:
  postgres:
    image: postgres:16-alpine
    container_name: statementgraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: statementgraph
      POSTGRES_USER: statementgraph
      POSTGRES_PASSWORD: statementgraph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statementgraph -d statementgraph"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.23
    container_name: statementgraph-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/statementgraph-password
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: statementgraph-backend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      POSTGRES_DSN: postgresql+psycopg://statementgraph:statementgraph@postgres:5432/statementgraph
      NEO4J_URI: bolt://neo4j:7687
      UPLOAD_DIR: /app/uploads
      ENVIRONMENT: docker
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: statementgraph-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
  backend_uploads:
